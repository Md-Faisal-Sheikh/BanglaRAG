# Optional: production-grade vector store + relational DB.
# The default app runs WITHOUT this (Chroma local + SQLite). Use this only when you
# want to demonstrate the production upgrade path described in docs/ARCHITECTURE.md.
#
#   docker compose up -d
# then set in .env:
#   VECTOR_STORE=qdrant
#   QDRANT_URL=http://localhost:6333
#   DATABASE_URL=postgresql+psycopg://banglarag:banglarag@localhost:5432/banglarag
#
# (Qdrant adapter is a stub in app/core/vectorstore.py — implement it before switching.)

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: banglarag
      POSTGRES_PASSWORD: banglarag
      POSTGRES_DB: banglarag
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  qdrant_data:
  pg_data:
