<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>সেবা সহায়ক — BanglaRAG</title>
  <style>
    :root {
      --paper: #f7f5ef;
      --surface: #ffffff;
      --primary: #0f6e5c;
      --primary-dark: #0a4e42;
      --ink: #1c2b27;
      --muted: #5c6b66;
      --border: #e5e2d8;
      --amber: #b7791f;
      --danger: #b23b2e;
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: "Noto Sans Bengali", "Vrinda", "Nirmala UI", system-ui, sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .serif {
      font-family: "Noto Serif Bengali", "Nirmala UI", Georgia, serif;
    }

    .center-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .auth-card {
      width: min(100%, 390px);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface);
      box-shadow: 0 18px 50px rgba(28, 43, 39, 0.08);
    }

    .brand-title {
      margin: 0 0 4px;
      color: var(--primary-dark);
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
    }

    .muted {
      color: var(--muted);
    }

    .auth-copy {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .field {
      width: 100%;
      min-height: 44px;
      margin-bottom: 12px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: white;
      color: var(--ink);
      outline: none;
    }

    .field:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 110, 92, 0.12);
    }

    textarea.field {
      min-height: 132px;
      resize: vertical;
    }

    .primary-button,
    .send-button {
      border: 0;
      background: var(--primary);
      color: white;
      font-weight: 600;
    }

    .primary-button {
      width: 100%;
      min-height: 44px;
      border-radius: 10px;
    }

    .text-button {
      border: 0;
      background: transparent;
      color: var(--muted);
    }

    .switch-button {
      width: 100%;
      margin-top: 14px;
      font-size: 14px;
    }

    .error {
      margin: 0 0 12px;
      color: var(--danger);
      font-size: 14px;
      line-height: 1.4;
    }

    .shell {
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(12px);
    }

    .topbar-inner,
    .chat,
    .admin {
      width: min(100%, 704px);
      margin: 0 auto;
      padding-inline: 16px;
    }

    .topbar-inner {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .topbar-title {
      color: var(--primary-dark);
      font-weight: 700;
      white-space: nowrap;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      min-width: 0;
      font-size: 14px;
    }

    .email {
      max-width: 220px;
      overflow: hidden;
      color: var(--muted);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chat {
      padding-top: 24px;
      padding-bottom: 126px;
    }

    .empty {
      margin-top: 64px;
      text-align: center;
      color: var(--muted);
    }

    .empty-title {
      margin: 0 0 8px;
      color: var(--primary-dark);
      font-size: 22px;
      font-weight: 700;
    }

    .message-row {
      display: flex;
      margin-bottom: 16px;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.65;
      white-space: pre-wrap;
      animation: fade 0.2s ease both;
    }

    .bubble.user {
      background: var(--primary);
      color: white;
    }

    .bubble.assistant {
      border: 1px solid var(--border);
      background: var(--surface);
    }

    .grounded {
      margin-top: 6px;
      color: var(--primary);
      font-size: 12px;
    }

    .ungrounded {
      margin-top: 6px;
      color: var(--amber);
      font-size: 12px;
    }

    .citation-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .citation {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--primary-dark);
      padding: 3px 8px;
      font-size: 12px;
    }

    .citation:hover {
      background: #e8f1ee;
    }

    .snippet {
      margin-top: 8px;
      padding: 12px;
      border-radius: 10px;
      background: #f0f4f2;
      color: var(--ink);
      font-size: 14px;
      white-space: normal;
    }

    .composer-wrap {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      padding: 28px 0 20px;
      background: linear-gradient(to top, var(--paper) 0%, var(--paper) 72%, rgba(247, 245, 239, 0));
    }

    .composer {
      width: min(100%, 704px);
      display: flex;
      gap: 8px;
      margin: 0 auto;
      padding-inline: 16px;
    }

    .composer .field {
      flex: 1;
      margin: 0;
      border-radius: 14px;
      padding: 12px 14px;
    }

    .send-button {
      min-width: 96px;
      border-radius: 14px;
      padding: 0 18px;
    }

    .admin {
      padding-top: 24px;
      padding-bottom: 40px;
    }

    .section-title {
      margin: 0 0 16px;
      color: var(--primary-dark);
      font-size: 22px;
    }

    .admin-form {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
    }

    .admin-form .primary-button {
      width: auto;
      padding-inline: 16px;
    }

    .form-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .form-divider::before,
    .form-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .upload-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .file-input {
      flex: 1;
      min-width: 180px;
      margin: 0;
      padding: 9px 12px;
    }

    .file-hint {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .doc-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .delete-button {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: white;
      color: var(--danger);
      padding: 4px 10px;
      font-size: 13px;
    }

    .delete-button:hover {
      background: #fbeae8;
    }

    .docs {
      display: grid;
      gap: 8px;
      margin-top: 24px;
    }

    .doc-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: white;
    }

    .doc-meta {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .loading {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      color: var(--muted);
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: none;
      }
    }

    @media (max-width: 560px) {
      .auth-card {
        padding: 24px;
      }

      .topbar-inner {
        align-items: flex-start;
        height: auto;
        min-height: 56px;
        padding-block: 12px;
      }

      .topbar-actions {
        flex-wrap: wrap;
      }

      .email {
        display: none;
      }

      .bubble {
        max-width: 92%;
      }

      .send-button {
        min-width: 76px;
        padding-inline: 12px;
      }

      .doc-row {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div id="root" class="loading">Loading BanglaRAG...</div>

  <script>
    (() => {
      const root = document.getElementById("root");
      const API = window.BANGLARAG_API_BASE || safeStorageGet("banglaragApiBase") || "/api";
      let state = {
        mode: "login",
        token: null,
        user: null,
        view: "chat",
        messages: [],
        conversationId: null,
        busy: false,
        error: "",
        docs: [],
        openCitation: null,
      };

      function safeStorageGet(key) {
        try {
          return window.localStorage ? window.localStorage.getItem(key) : null;
        } catch (_) {
          return null;
        }
      }

      function safeStorageSet(key, value) {
        try {
          if (window.localStorage) window.localStorage.setItem(key, value);
        } catch (_) {}
      }

      function safeStorageRemove(key) {
        try {
          if (window.localStorage) window.localStorage.removeItem(key);
        } catch (_) {}
      }

      function safeJsonParse(value) {
        try {
          return value ? JSON.parse(value) : null;
        } catch (_) {
          return null;
        }
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function api(path, { method = "GET", body, token } = {}) {
        const headers = { "Content-Type": "application/json" };
        if (token) headers.Authorization = "Bearer " + token;
        return fetch(API + path, {
          method,
          headers,
          body: body ? JSON.stringify(body) : undefined,
        }).then(async (response) => {
          if (!response.ok) {
            const data = await response.json().catch(() => ({}));
            throw new Error(data.detail || response.statusText || "Request failed");
          }
          return response.status === 204 ? null : response.json();
        });
      }

      function login(email, password) {
        const form = new URLSearchParams({ username: email, password });
        return fetch(API + "/auth/login", { method: "POST", body: form }).then(async (response) => {
          if (!response.ok) throw new Error("ভুল ইমেইল বা পাসওয়ার্ড");
          return response.json();
        });
      }

      function setState(patch) {
        state = { ...state, ...patch };
        render();
      }

      function button(text, attrs = "") {
        return `<button ${attrs}>${escapeHtml(text)}</button>`;
      }

      function renderAuth() {
        const actionLabel = state.busy
          ? "অপেক্ষা করুন..."
          : state.mode === "login"
            ? "লগইন"
            : "নিবন্ধন করুন";
        const switchLabel = state.mode === "login"
          ? "নতুন অ্যাকাউন্ট তৈরি করুন"
          : "ইতিমধ্যে অ্যাকাউন্ট আছে? লগইন";

        root.className = "";
        root.innerHTML = `
          <main class="center-page">
            <section class="auth-card">
              <h1 class="serif brand-title">সেবা সহায়ক</h1>
              <p class="auth-copy">সরকারি সেবা সম্পর্কে বাংলায় নির্ভরযোগ্য উত্তর</p>
              <input id="email" class="field" type="email" autocomplete="email" placeholder="ইমেইল" />
              <input id="password" class="field" type="password" autocomplete="current-password" placeholder="পাসওয়ার্ড" />
              ${state.error ? `<p class="error">${escapeHtml(state.error)}</p>` : ""}
              ${button(actionLabel, `id="auth-submit" class="primary-button" ${state.busy ? "disabled" : ""}`)}
              ${button(switchLabel, `id="auth-switch" class="text-button switch-button" ${state.busy ? "disabled" : ""}`)}
            </section>
          </main>
        `;

        const email = root.querySelector("#email");
        const password = root.querySelector("#password");
        const submit = root.querySelector("#auth-submit");
        const switcher = root.querySelector("#auth-switch");

        submit.addEventListener("click", () => submitAuth(email.value.trim(), password.value));
        password.addEventListener("keydown", (event) => {
          if (event.key === "Enter") submitAuth(email.value.trim(), password.value);
        });
        switcher.addEventListener("click", () => {
          setState({ mode: state.mode === "login" ? "register" : "login", error: "" });
        });
      }

      async function submitAuth(email, password) {
        if (!email || !password || state.busy) return;
        setState({ busy: true, error: "" });
        try {
          if (state.mode === "register") {
            await api("/auth/register", { method: "POST", body: { email, password } });
          }
          const { access_token: token } = await login(email, password);
          const user = await api("/auth/me", { token });
          safeStorageSet("brag", JSON.stringify({ token, user }));
          setState({ token, user, busy: false, error: "", view: "chat" });
        } catch (error) {
          setState({ busy: false, error: error.message });
        }
      }

      function renderShell(content) {
        const adminButton = state.user && state.user.is_admin
          ? button(state.view === "chat" ? "কর্পাস" : "চ্যাট", `id="toggle-view" class="text-button" style="color:var(--primary)"`)
          : "";

        root.className = "";
        root.innerHTML = `
          <div class="shell">
            <header class="topbar">
              <div class="topbar-inner">
                <div class="serif topbar-title">সেবা সহায়ক</div>
                <nav class="topbar-actions">
                  ${adminButton}
                  <span class="email">${escapeHtml(state.user ? state.user.email : "")}</span>
                  ${button("লগআউট", `id="logout" class="text-button"`)}
                </nav>
              </div>
            </header>
            ${content}
          </div>
        `;

        const toggle = root.querySelector("#toggle-view");
        const logout = root.querySelector("#logout");
        if (toggle) {
          toggle.addEventListener("click", () => {
            const nextView = state.view === "chat" ? "admin" : "chat";
            setState({ view: nextView });
            if (nextView === "admin") loadDocs();
          });
        }
        logout.addEventListener("click", () => {
          safeStorageRemove("brag");
          setState({ token: null, user: null, view: "chat", messages: [], conversationId: null });
        });
      }

      function renderChat() {
        const empty = state.messages.length
          ? ""
          : `
            <section class="empty">
              <h2 class="serif empty-title">কীভাবে সাহায্য করতে পারি?</h2>
              <p>যেমন: “ই-পাসপোর্টের জন্য কোথায় আবেদন করতে হয়?”</p>
            </section>
          `;
        const messages = state.messages.map((message, index) => renderMessage(message, index)).join("");
        const content = `
          <main class="chat">
            ${empty}
            ${messages}
          </main>
          <section class="composer-wrap">
            <div class="composer">
              <input id="question" class="field" placeholder="আপনার প্রশ্ন লিখুন..." ${state.busy ? "disabled" : ""} />
              ${button(state.busy ? "..." : "পাঠান", `id="send" class="send-button" ${state.busy ? "disabled" : ""}`)}
            </div>
          </section>
        `;

        renderShell(content);

        const question = root.querySelector("#question");
        const send = root.querySelector("#send");
        send.addEventListener("click", () => sendQuestion(question.value));
        question.addEventListener("keydown", (event) => {
          if (event.key === "Enter") sendQuestion(question.value);
        });
        question.focus();
        root.querySelectorAll("[data-citation]").forEach((node) => {
          node.addEventListener("click", () => {
            const key = node.getAttribute("data-citation");
            setState({ openCitation: state.openCitation === key ? null : key });
          });
        });
      }

      function renderMessage(message, index) {
        const role = message.role === "user" ? "user" : "assistant";
        const status = role === "assistant"
          ? `<div class="${message.grounded === false ? "ungrounded" : "grounded"}">● ${
              message.grounded === false ? "তথ্যসূত্রে উত্তর পাওয়া যায়নি" : "সূত্রভিত্তিক উত্তর"
            }</div>`
          : "";
        const citations = role === "assistant" ? renderCitations(message, index) : "";
        return `
          <div class="message-row ${role}">
            <article class="bubble ${role}">
              ${escapeHtml(message.content)}
              ${status}
              ${citations}
            </article>
          </div>
        `;
      }

      function renderCitations(message, index) {
        const items = message.citations || [];
        if (!items.length) return "";
        const chips = items.map((citation) => {
          const key = `${index}-${citation.marker}`;
          return button(`সূত্র [${citation.marker}] · ${citation.source}`, `class="citation" data-citation="${key}"`);
        }).join("");
        const open = items.find((citation) => state.openCitation === `${index}-${citation.marker}`);
        return `
          <div class="citation-list">${chips}</div>
          ${open ? `<div class="snippet">${escapeHtml(open.snippet)}...</div>` : ""}
        `;
      }

      async function sendQuestion(value) {
        const question = value.trim();
        if (!question || state.busy) return;
        setState({
          busy: true,
          messages: [...state.messages, { role: "user", content: question }],
          openCitation: null,
        });
        try {
          const response = await api("/chat", {
            method: "POST",
            token: state.token,
            body: { question, conversation_id: state.conversationId },
          });
          setState({
            busy: false,
            conversationId: response.conversation_id,
            messages: [
              ...state.messages,
              {
                role: "assistant",
                content: response.answer,
                citations: response.citations,
                grounded: response.grounded,
              },
            ],
          });
        } catch (error) {
          setState({
            busy: false,
            messages: [...state.messages, { role: "assistant", content: "ত্রুটি: " + error.message, grounded: false }],
          });
        }
      }

      function renderAdmin() {
        const rows = state.docs.length
          ? state.docs.map((doc) => `
              <article class="doc-row">
                <span>${escapeHtml(doc.title)}</span>
                <span class="doc-actions">
                  <span class="doc-meta">সংস্করণ ${escapeHtml(doc.version)} · ${escapeHtml(doc.n_chunks)} অংশ</span>
                  ${button("মুছুন", `class="delete-button" data-del="${escapeHtml(doc.id)}" ${state.busy ? "disabled" : ""}`)}
                </span>
              </article>
            `).join("")
          : `<p class="muted">এখনো কোনো ডকুমেন্ট যোগ করা হয়নি।</p>`;
        const content = `
          <main class="admin">
            <h2 class="serif section-title">কর্পাস ব্যবস্থাপনা</h2>
            <section class="admin-form">
              <input id="doc-title" class="field" placeholder="ডকুমেন্ট শিরোনাম (ফাইলের জন্য ঐচ্ছিক)" />
              <textarea id="doc-text" class="field" placeholder="বাংলা টেক্সট পেস্ট করুন..."></textarea>
              ${button(state.busy ? "যুক্ত হচ্ছে..." : "টেক্সট ইনডেক্সে যুক্ত করুন", `id="add-doc" class="primary-button" ${state.busy ? "disabled" : ""}`)}
              <div class="form-divider">অথবা ফাইল আপলোড করুন</div>
              <div class="upload-row">
                <input id="doc-file" class="field file-input" type="file" accept=".txt,.md,.pdf,.docx" ${state.busy ? "disabled" : ""} />
                ${button(state.busy ? "আপলোড হচ্ছে..." : "আপলোড", `id="upload-doc" class="primary-button" ${state.busy ? "disabled" : ""}`)}
              </div>
              <p class="file-hint">সমর্থিত: .txt, .md, .pdf, .docx (সর্বোচ্চ ১০ MB)</p>
            </section>
            <section class="docs">${rows}</section>
          </main>
        `;

        renderShell(content);

        root.querySelector("#add-doc").addEventListener("click", () => {
          const title = root.querySelector("#doc-title").value.trim();
          const text = root.querySelector("#doc-text").value.trim();
          addDoc(title, text);
        });
        root.querySelector("#upload-doc").addEventListener("click", () => {
          const fileInput = root.querySelector("#doc-file");
          const title = root.querySelector("#doc-title").value.trim();
          uploadDoc(fileInput.files[0], title);
        });
        root.querySelectorAll("[data-del]").forEach((node) => {
          node.addEventListener("click", () => deleteDoc(node.getAttribute("data-del")));
        });
      }

      async function loadDocs() {
        if (!state.token) return;
        try {
          const docs = await api("/admin/documents", { token: state.token });
          setState({ docs });
        } catch (_) {}
      }

      async function refreshDocs() {
        const docs = await api("/admin/documents", { token: state.token });
        setState({ busy: false, docs });
      }

      async function addDoc(title, text) {
        if (!title || !text || state.busy) return;
        setState({ busy: true });
        try {
          await api("/admin/documents", { method: "POST", token: state.token, body: { title, text, lang: "bn" } });
          await refreshDocs();
        } catch (error) {
          alert(error.message);
          setState({ busy: false });
        }
      }

      async function uploadDoc(file, title) {
        if (!file || state.busy) return;
        setState({ busy: true });
        try {
          const form = new FormData();
          form.append("file", file);
          form.append("lang", "bn");
          if (title) form.append("title", title);
          const response = await fetch(API + "/admin/documents/upload", {
            method: "POST",
            headers: { Authorization: "Bearer " + state.token },
            body: form,
          });
          if (!response.ok) {
            const data = await response.json().catch(() => ({}));
            throw new Error(data.detail || response.statusText || "আপলোড ব্যর্থ হয়েছে");
          }
          await refreshDocs();
        } catch (error) {
          alert(error.message);
          setState({ busy: false });
        }
      }

      async function deleteDoc(id) {
        if (!id || state.busy) return;
        try {
          if (!window.confirm("এই ডকুমেন্টটি মুছে ফেলবেন?")) return;
        } catch (_) { /* sandboxed iframe: skip confirmation */ }
        setState({ busy: true });
        try {
          await api("/admin/documents/" + id, { method: "DELETE", token: state.token });
          await refreshDocs();
        } catch (error) {
          alert(error.message);
          setState({ busy: false });
        }
      }

      function render() {
        if (!state.token) {
          renderAuth();
          return;
        }
        if (state.view === "admin") {
          renderAdmin();
          return;
        }
        renderChat();
      }

      const saved = safeJsonParse(safeStorageGet("brag"));
      if (saved && saved.token && saved.user) {
        state = { ...state, token: saved.token, user: saved.user };
      }
      render();
      if (state.view === "admin") loadDocs();
    })();
  </script>
</body>
</html>
